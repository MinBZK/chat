apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ing2
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/permanent-redirect: "https://element.chat.la-suite.apps.digilab.network"
    nginx.ingress.kubernetes.io/permanent-redirect-code: "302"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      location = /.well-known/matrix/server {
        default_type application/json;
        return 200 '{"m.server": "matrix.chat.la-suite.apps.digilab.network:443"}';
      }
spec:
  rules:
    - host: "chat.la-suite.apps.digilab.network"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: svc
                port:
                  number: 8000
  tls:
    - hosts:
        - chat.la-suite.apps.digilab.network
      secretName: chat-tls
